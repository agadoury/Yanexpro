# ============================================================================
# Déploiement automatique sur GitHub Pages
# ============================================================================
# À chaque poussée sur `main`, ce workflow :
#   1. installe les dépendances ;
#   2. construit le site statique (npm run build → dist/) ;
#   3. publie dist/ sur GitHub Pages.
#
# Activation requise (une seule fois) :
#   GitHub → Settings → Pages → Source : « GitHub Actions »
#
# Domaine personnalisé (yanexpro.com) : à configurer dans la même page
# Settings → Pages, plus un enregistrement DNS chez le registraire.
# ============================================================================
name: Déployer le site

on:
  push:
    branches: [main]
  # Permet aussi de lancer le déploiement à la main depuis l'onglet Actions.
  workflow_dispatch:

# Autorisations minimales nécessaires pour publier sur Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on n'annule pas un déploiement en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Construire le site
        run: npm run build

      - name: Téléverser le site construit
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publier sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
